<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Stonedge — Material Details</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161513;
    --muted:#6f6a63;
    --line:#e5e1d8;
    --paper:#ffffff;
    --panel:#f7f5f1;
    --whatsapp:#25D366;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{margin:0;font-family:'Inter',sans-serif;color:var(--ink);background:var(--panel);padding-bottom:96px;}

  .topbar{
    position:sticky;top:0;z-index:20;
    display:flex;align-items:center;gap:11px;
    padding:13px 18px;background:var(--ink);color:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.18);
  }
  .topbar img{width:32px;height:32px;border-radius:50%;flex-shrink:0;}
  .topbar .tb-text{line-height:1.2;}
  .topbar .tb-name{font-family:'Poppins',sans-serif;font-weight:600;font-size:14.5px;letter-spacing:.01em;}
  .topbar .tb-tag{font-size:10.5px;color:#c9c3b6;margin-top:1px;letter-spacing:.02em;}

  .skeleton{padding:18px;}
  .sk-block{background:linear-gradient(90deg,#ece8e0 25%,#f5f3ee 37%,#ece8e0 63%);background-size:400% 100%;animation:shimmer 1.4s ease infinite;border-radius:14px;}
  .sk-hero{width:100%;aspect-ratio:1/1;border-radius:16px;}
  .sk-line{height:14px;border-radius:7px;margin-top:14px;}
  @keyframes shimmer{0%{background-position:100% 0;}100%{background-position:0 0;}}

  .wrap{max-width:640px;margin:0 auto;padding:0 0 20px;}
  .gallery-outer{position:relative;background:#111;overflow:hidden;aspect-ratio:1/1;}
  .gallery-track{position:absolute;inset:0;}
  .gallery-track img{
    position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    opacity:0;transition:opacity .32s ease;
  }
  .gallery-track img.active{opacity:1;}
  .gallery-outer .tap-zone{position:absolute;top:0;bottom:0;width:38%;z-index:3;}
  .gallery-outer .tap-zone.left{left:0;}
  .gallery-outer .tap-zone.right{right:0;}
  .gallery-nav{
    position:absolute;top:50%;transform:translateY(-50%);z-index:4;
    width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.92);
    color:var(--ink);border:none;display:flex;align-items:center;justify-content:center;
    font-size:16px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.25);
    opacity:.9;
  }
  .gallery-nav.prev{left:12px;}
  .gallery-nav.next{right:12px;}
  .counter-pill{
    position:absolute;bottom:12px;right:12px;z-index:4;
    background:rgba(22,21,19,.62);color:#fff;font-size:11.5px;font-weight:600;
    padding:4px 10px;border-radius:20px;letter-spacing:.02em;
    backdrop-filter:blur(2px);
  }
  .zoom-hint{
    position:absolute;bottom:12px;left:12px;z-index:4;
    background:rgba(22,21,19,.55);color:#fff;font-size:10.5px;font-weight:500;
    padding:4px 9px;border-radius:20px;display:flex;align-items:center;gap:5px;
  }
  .zoom-hint svg{width:11px;height:11px;}

  .thumbs{display:flex;gap:8px;padding:12px 18px 0;overflow-x:auto;}
  .thumbs img{
    width:58px;height:58px;object-fit:cover;border-radius:10px;flex:0 0 auto;
    opacity:.5;cursor:pointer;border:2px solid transparent;transition:opacity .2s,border-color .2s;
  }
  .thumbs img.active{opacity:1;border-color:var(--ink);}

  .content{padding:20px 18px 4px;}
  .category{
    display:inline-flex;align-items:center;gap:5px;
    font-family:'Poppins',sans-serif;font-weight:600;font-size:10.5px;text-transform:uppercase;letter-spacing:.09em;
    color:var(--ink);background:#fff;border:1px solid var(--line);padding:5px 11px 5px 9px;border-radius:20px;
  }
  .category .dot{width:6px;height:6px;border-radius:50%;background:var(--ink);}
  h1{font-family:'Poppins',sans-serif;font-weight:700;font-size:25px;line-height:1.18;margin:12px 0 8px;letter-spacing:.001em;}
  .desc{font-size:14.5px;line-height:1.65;color:#3d3a35;}

  .divider{height:1px;background:var(--line);margin:22px 18px;}

  .company-card{
    margin:0 18px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 17px;
  }
  .company-card .cc-title{font-family:'Poppins',sans-serif;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:11px;}
  .cc-row{display:flex;align-items:center;gap:10px;padding:7px 0;font-size:13.5px;color:var(--ink);text-decoration:none;}
  .cc-row + .cc-row{border-top:1px solid #f0ede6;}
  .cc-row svg{width:16px;height:16px;flex-shrink:0;color:var(--muted);}
  .cc-row span{word-break:break-all;}

  .cta-bar{
    position:fixed;bottom:0;left:0;right:0;z-index:30;
    background:rgba(255,255,255,.96);backdrop-filter:blur(6px);
    border-top:1px solid var(--line);
    padding:12px 16px calc(12px + env(safe-area-inset-bottom));
    display:flex;justify-content:center;
  }
  .wa-btn{
    display:flex;align-items:center;justify-content:center;gap:10px;
    width:100%;max-width:600px;
    background:var(--whatsapp);color:#fff;
    font-family:'Poppins',sans-serif;font-weight:600;font-size:15px;
    padding:13px;border-radius:11px;text-decoration:none;
    box-shadow:0 6px 18px rgba(37,211,102,.4);
    transition:transform .12s ease;
  }
  .wa-btn:active{transform:scale(.98);}
  .wa-btn svg{width:19px;height:19px;flex-shrink:0;}

  .lightbox{
    position:fixed;inset:0;background:rgba(10,9,8,.97);z-index:100;
    display:none;align-items:center;justify-content:center;
    touch-action:none;
  }
  .lightbox.open{display:flex;}
  .lightbox img{max-width:100%;max-height:100%;object-fit:contain;transition:transform .18s ease;transform-origin:center;touch-action:none;}
  .lightbox-close{
    position:absolute;top:calc(16px + env(safe-area-inset-top));right:16px;z-index:101;
    width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.14);color:#fff;
    border:none;font-size:19px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  .lightbox-hint{
    position:absolute;bottom:calc(20px + env(safe-area-inset-bottom));left:0;right:0;
    text-align:center;color:rgba(255,255,255,.55);font-size:11.5px;letter-spacing:.02em;
  }

  .fade-in{animation:fadeIn .45s ease both;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

  .notfound{max-width:420px;margin:100px auto 0;text-align:center;padding:0 24px;}
  .notfound .nf-icon{font-size:34px;margin-bottom:10px;}
  .notfound h2{font-family:'Poppins',sans-serif;font-size:19px;margin:0 0 8px;}
  .notfound p{color:var(--muted);font-size:13.5px;line-height:1.65;margin:0;}
</style>
</head>
<body>

<header class="topbar" id="topbar" style="display:none;">
  <img id="topLogo" src="" alt="">
  <div class="tb-text">
    <div class="tb-name" id="topCompany">Stonedge</div>
    <div class="tb-tag">Marble · Granite · Quartzite</div>
  </div>
</header>

<div class="skeleton" id="skeleton">
  <div class="sk-block sk-hero"></div>
  <div class="sk-block sk-line" style="width:40%;"></div>
  <div class="sk-block sk-line" style="width:70%;height:22px;"></div>
  <div class="sk-block sk-line" style="width:95%;"></div>
  <div class="sk-block sk-line" style="width:85%;"></div>
</div>

<div class="wrap" id="content" style="display:none;">
  <div class="gallery-outer" id="galleryOuter">
    <div class="gallery-track" id="galleryTrack"></div>
    <div class="tap-zone left" id="tapPrev"></div>
    <div class="tap-zone right" id="tapNext"></div>
    <button class="gallery-nav prev" id="navPrev" aria-label="Previous">‹</button>
    <button class="gallery-nav next" id="navNext" aria-label="Next">›</button>
    <div class="counter-pill" id="counterPill">1 / 1</div>
    <div class="zoom-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      Tap to zoom
    </div>
  </div>
  <div class="thumbs" id="thumbs"></div>

  <div class="content fade-in">
    <span class="category" id="category"><span class="dot"></span><span id="categoryText">Marble</span></span>
    <h1 id="matName">Material Name</h1>
    <div class="desc" id="matDesc"></div>
  </div>

  <div class="divider"></div>

  <div class="company-card fade-in">
    <div class="cc-title">Get in touch</div>
    <a class="cc-row" id="ccPhone" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      <span id="ccPhoneText">—</span>
    </a>
    <a class="cc-row" id="ccEmail" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 6l-10 7L2 6"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>
      <span id="ccEmailText">—</span>
    </a>
    <a class="cc-row" id="ccWeb" href="#" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 0 20 15.3 15.3 0 0 1 0-20z"/></svg>
      <span id="ccWebText">—</span>
    </a>
  </div>
</div>

<div id="notfoundBlock" class="notfound" style="display:none;">
  <div class="nf-icon">&#9671;</div>
  <h2>Material not found</h2>
  <p>We couldn't find details for this item. Please contact us directly and quote the lot number on your label.</p>
</div>

<div class="cta-bar" id="ctaBar" style="display:none;">
  <a href="#" id="waBtn" class="wa-btn" target="_blank" rel="noopener">
    <svg viewBox="0 0 32 32" fill="currentColor"><path d="M16 0C7.16 0 0 7.16 0 16c0 2.82.74 5.47 2.03 7.76L0 32l8.46-2.22A15.9 15.9 0 0 0 16 32c8.84 0 16-7.16 16-16S24.84 0 16 0zm0 29.09c-2.5 0-4.85-.68-6.87-1.87l-.49-.29-5.02 1.32 1.34-4.9-.32-.5A13.06 13.06 0 0 1 2.91 16C2.91 8.77 8.77 2.91 16 2.91S29.09 8.77 29.09 16 23.23 29.09 16 29.09zm7.17-9.8c-.39-.2-2.32-1.14-2.68-1.27-.36-.13-.62-.2-.88.2-.26.39-1.01 1.27-1.24 1.53-.23.26-.46.29-.85.1-.39-.2-1.64-.6-3.13-1.93-1.16-1.03-1.94-2.31-2.17-2.7-.23-.39-.02-.6.17-.8.18-.18.39-.46.59-.69.2-.23.26-.39.39-.65.13-.26.07-.49-.03-.69-.1-.2-.88-2.12-1.2-2.9-.32-.76-.64-.66-.88-.67-.23-.01-.49-.01-.75-.01-.26 0-.69.1-1.05.49-.36.39-1.37 1.34-1.37 3.26s1.4 3.78 1.6 4.04c.2.26 2.75 4.2 6.66 5.89.93.4 1.66.64 2.23.82.94.3 1.79.26 2.46.16.75-.11 2.32-.95 2.65-1.87.33-.92.33-1.7.23-1.87-.1-.16-.36-.26-.75-.46z"/></svg>
    <span id="waLabel">Enquire on WhatsApp</span>
  </a>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" id="lightboxClose" aria-label="Close">×</button>
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-hint">Double-tap to zoom · Tap × to close</div>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug') || params.get('m');

  let images = [];
  let current = 0;
  let lightboxOpen = false;
  let lightboxZoomed = false;

  fetch('materials.json')
    .then(r => r.json())
    .then(data => {
      $('skeleton').style.display = 'none';
      const topbar = $('topbar');
      topbar.style.display = 'flex';
      $('topCompany').textContent = data.companyName || 'Stonedge';
      if(data.logo){ $('topLogo').src = data.logo; }
      else { $('topLogo').style.display = 'none'; }

      const mat = slug && data.materials ? data.materials[slug] : null;

      if(!mat){
        $('notfoundBlock').style.display = 'block';
        return;
      }

      $('content').style.display = 'block';
      $('ctaBar').style.display = 'flex';
      $('categoryText').textContent = mat.category || '';
      $('matName').textContent = mat.name || slug;
      $('matDesc').textContent = mat.description || '';
      document.title = (mat.name || 'Material') + ' — ' + (data.companyName || 'Stonedge');

      const phone = data.phone || data.whatsappNumber || '';
      const email = data.email || '';
      const website = data.website || '';
      if(phone){
        $('ccPhoneText').textContent = data.phoneDisplay || phone;
        $('ccPhone').href = 'tel:+' + phone.replace(/[^0-9]/g,'');
      } else { $('ccPhone').style.display = 'none'; }
      if(email){
        $('ccEmailText').textContent = email;
        $('ccEmail').href = 'mailto:' + email;
      } else { $('ccEmail').style.display = 'none'; }
      if(website){
        $('ccWebText').textContent = website.replace(/^https?:\/\//,'');
        $('ccWeb').href = website;
      } else { $('ccWeb').style.display = 'none'; }

      images = (mat.images && mat.images.length) ? mat.images : [];
      const track = $('galleryTrack');
      const thumbsWrap = $('thumbs');

      if(images.length === 0){
        $('galleryOuter').style.display = 'none';
      } else {
        images.forEach((src, i) => {
          const img = document.createElement('img');
          img.src = src;
          img.className = i === 0 ? 'active' : '';
          img.alt = mat.name || '';
          img.loading = i === 0 ? 'eager' : 'lazy';
          track.appendChild(img);

          const th = document.createElement('img');
          th.src = src;
          th.className = i === 0 ? 'active' : '';
          th.addEventListener('click', () => show(i));
          thumbsWrap.appendChild(th);
        });
        $('counterPill').textContent = '1 / ' + images.length;
        if(images.length <= 1){
          $('navPrev').style.display = 'none';
          $('navNext').style.display = 'none';
          $('counterPill').style.display = 'none';
          $('tapPrev').style.display = 'none';
          $('tapNext').style.display = 'none';
        }
      }

      const num = (data.whatsappNumber || '').replace(/[^0-9]/g, '');
      const msg = encodeURIComponent('Hi, I\'m interested in ' + (mat.name || 'this material') + '. Could you share more details and pricing?');
      $('waBtn').href = 'https://wa.me/' + num + '?text=' + msg;
    })
    .catch(() => {
      $('skeleton').style.display = 'none';
      $('notfoundBlock').style.display = 'block';
    });

  function show(i){
    if(images.length === 0) return;
    current = (i + images.length) % images.length;
    const imgs = document.querySelectorAll('#galleryTrack img');
    const thumbs = document.querySelectorAll('#thumbs img');
    imgs.forEach((im,idx) => im.classList.toggle('active', idx === current));
    thumbs.forEach((t,idx) => t.classList.toggle('active', idx === current));
    $('counterPill').textContent = (current+1) + ' / ' + images.length;
    if(lightboxOpen) setLightboxImage();
  }

  $('navNext').addEventListener('click', () => show(current+1));
  $('navPrev').addEventListener('click', () => show(current-1));
  $('tapNext').addEventListener('click', () => show(current+1));
  $('tapPrev').addEventListener('click', () => show(current-1));

  let touchStartX = null;
  const galleryOuter = $('galleryOuter');
  galleryOuter.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
  galleryOuter.addEventListener('touchend', e => {
    if(touchStartX === null) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    if(Math.abs(dx) > 40){ dx < 0 ? show(current+1) : show(current-1); }
    touchStartX = null;
  }, {passive:true});

  galleryOuter.addEventListener('click', e => {
    if(e.target.closest('.tap-zone') || e.target.closest('.gallery-nav')) return;
    openLightbox();
  });

  function setLightboxImage(){
    if(images.length === 0) return;
    $('lightboxImg').src = images[current];
    $('lightboxImg').style.transform = 'scale(1)';
    lightboxZoomed = false;
  }
  function openLightbox(){
    if(images.length === 0) return;
    setLightboxImage();
    $('lightbox').classList.add('open');
    lightboxOpen = true;
  }
  function closeLightbox(){
    $('lightbox').classList.remove('open');
    lightboxOpen = false;
  }
  $('lightboxClose').addEventListener('click', closeLightbox);
  $('lightbox').addEventListener('click', e => {
    if(e.target.id === 'lightbox') closeLightbox();
  });

  let lastTap = 0;
  $('lightboxImg').addEventListener('click', e => {
    const now = Date.now();
    if(now - lastTap < 300){
      lightboxZoomed = !lightboxZoomed;
      $('lightboxImg').style.transform = lightboxZoomed ? 'scale(2.2)' : 'scale(1)';
    }
    lastTap = now;
    e.stopPropagation();
  });

  let lbTouchStartX = null;
  $('lightbox').addEventListener('touchstart', e => { lbTouchStartX = e.touches[0].clientX; }, {passive:true});
  $('lightbox').addEventListener('touchend', e => {
    if(lbTouchStartX === null || lightboxZoomed) return;
    const dx = e.changedTouches[0].clientX - lbTouchStartX;
    if(Math.abs(dx) > 50){ dx < 0 ? show(current+1) : show(current-1); }
    lbTouchStartX = null;
  }, {passive:true});
})();
</script>
</body>
</html>
